# ============================================================
# TELETRAAN I — nginx config
# Serves the dashboard and proxies agent API calls to avoid
# CORS issues when the dashboard fetches node data.
# ============================================================

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip for faster dashboard loads
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    server {
        listen 80;
        server_name _;

        # ── Dashboard UI ──────────────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header X-Teletraan-Node $hostname;
        }

        # ── Agent proxy: /api/<ip>/<path> → http://<ip>:7071/<path>
        # This lets the dashboard call /api/192.168.1.10/stats
        # instead of directly, avoiding CORS blocks.
        location ~ ^/api/([^/]+)/(.*)$ {
            set $target_host $1;
            set $target_path $2;
            proxy_pass          http://$target_host:7071/$target_path;
            proxy_http_version  1.1;
            proxy_set_header    Host $target_host;
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;
            proxy_intercept_errors on;
            error_page 502 503 504 = @agent_offline;
        }

        location @agent_offline {
            default_type application/json;
            return 503 '{"error":"agent_offline","code":503}';
        }

        # ── Health endpoint (used by keepalived / monitoring) ──
        location /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"teletraan-dashboard"}';
        }
    }
}
