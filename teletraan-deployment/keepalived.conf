# ============================================================
# TELETRAAN I — keepalived config for HA failover
# Install on EACH dashboard host: apt install keepalived
# Copy this file to /etc/keepalived/keepalived.conf
#
# How it works:
#   - The MASTER node holds a virtual IP (e.g. 192.168.1.200)
#   - If the master dies, a BACKUP promotes itself in ~2s
#   - Your browser always hits http://192.168.1.200:7070
#   - Set priority: MASTER=110, BACKUP1=100, BACKUP2=90
# ============================================================

global_defs {
    router_id TELETRAAN_HA
    script_user root
    enable_script_security
}

# Health check: make sure the dashboard container is actually responding
vrrp_script chk_teletraan {
    script "/usr/bin/curl -sf http://localhost:7070/health"
    interval 3      # check every 3 seconds
    weight  -20     # if check fails, reduce priority by 20 (forces failover)
    fall    2        # need 2 consecutive failures before acting
    rise    2        # need 2 consecutive successes to promote back
}

vrrp_instance TELETRAAN_VIP {
    state MASTER            # Change to BACKUP on non-primary nodes
    interface eth0          # Change to your network interface (ip a to check)
    virtual_router_id 74    # Must be the same on ALL nodes (1-255, pick any)
    priority 110            # MASTER=110, BACKUP1=100, BACKUP2=90

    advert_int 1            # Send heartbeat every 1 second

    authentication {
        auth_type PASS
        auth_pass T3l3tr4an  # Same password on ALL nodes
    }

    virtual_ipaddress {
        192.168.1.200/24    # ← CHANGE THIS to a free IP on your subnet
    }

    track_script {
        chk_teletraan
    }

    # Optional: run scripts on state change
    notify_master "/usr/bin/logger -t teletraan 'TELETRAAN: This node is now MASTER'"
    notify_backup "/usr/bin/logger -t teletraan 'TELETRAAN: This node is now BACKUP'"
    notify_fault  "/usr/bin/logger -t teletraan 'TELETRAAN: Fault detected, stepping down'"
}
